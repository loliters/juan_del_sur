<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Modificar Usuario</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #2B2D33;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card-form {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 30px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<div class="card-form">

  <h5 class="mb-3">Modificar Usuario</h5>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <!-- Nombre (bloqueado) -->
    <div class="mb-3">
      <label>Nombre</label>
      <input type="text" class="form-control" value="{{ usuario.nom_usuario }}" disabled>
    </div>

    <!-- Apellido 1 (bloqueado) -->
    <div class="mb-3">
      <label>Primer Apellido</label>
      <input type="text" class="form-control" value="{{ usuario.ap1 }}" disabled>
    </div>

    <!-- Apellido 2 (bloqueado) -->
    <div class="mb-3">
      <label>Segundo Apellido</label>
      <input type="text" class="form-control" value="{{ usuario.ap2 }}" disabled>
    </div>

    <!-- Email (bloqueado) -->
    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" value="{{ usuario.email }}" disabled>
    </div>

    <!-- Rol (EDITABLE) -->
    <div class="mb-3">
      <label>Rol</label>
      <select name="rol" class="form-select">
        {% for r in roles %}
          <option value="{{ r.id }}" {% if usuario.rol.id == r.id %}selected{% endif %}>
            {{ r.nom_rol }}
          </option>
        {% endfor %}
      </select>
    </div>

    <!-- Estado (EDITABLE) -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <label class="mb-0">Activo</label>
      <input type="checkbox" name="estado" {% if usuario.estado %}checked{% endif %}>
    </div>

    <button class="btn btn-primary w-100">
      Guardar cambios
    </button>

  </form>

</div>

</body>
</html>
