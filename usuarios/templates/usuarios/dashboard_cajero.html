<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Cajero Profesional - Juan del Sur</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
/* ====== TU CSS ORIGINAL SIN CAMBIOS ====== */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #2B2D33;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: #FFFFFF;
}

.top-header {
  background: #1F1F1F;
  padding: 12px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

.logo-img { height: 52px; border-radius: 12px; }

.nav-buttons .btn-nav {
  background: rgba(255,255,255,0.08);
  border: none;
  margin-left: 12px;
  padding: 8px 22px;
  border-radius: 40px;
  color: white;
}

.nav-buttons .btn-nav.active,
.nav-buttons .btn-nav:hover {
  background: #0671B8;
}

.dashboard-three {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  padding: 28px;
}

.productos-col, .cart-col, .crud-col {
  border-radius: 32px;
  padding: 22px;
}

.productos-col {
  flex: 2;
  background: #F5F5F5;
  color: black;
}

.cart-col {
  flex: 1.2;
  background: #3A3A3A;
}

.crud-col {
  flex: 1.2;
  background: #EAEAEA;
  color: black;
  border-left: 5px solid #0671B8;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 18px;
}

.card-producto {
  background: #E0E0E0;
  padding: 12px;
  border-radius: 20px;
}

.prod-nombre { font-weight: bold; }
.prod-precio { color: #0671B8; font-size: 1.2rem; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-header">
  <img src="https://placehold.co/180x60" class="logo-img">

  <div class="nav-buttons">
    <button class="btn-nav active">Tienda</button>
    <button class="btn-nav">Movimientos</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard-three">

  <!-- PRODUCTOS -->
  <div class="productos-col">
    <h5><i class="fas fa-store"></i> Catálogo de productos</h5>

    <input class="form-control mb-3" placeholder="Buscar productos...">

    <div class="product-grid">

      <!-- DJANGO LOOP AQUÍ -->
      {% for p in productos %}
      <div class="card-producto">
        <div class="prod-nombre">{{ p.nombre }}</div>
        <div>📦 {{ p.stock }}</div>
        <div class="prod-precio">${{ p.precio }}</div>

        <button class="btn btn-sm btn-primary mt-2">
          🛒 Agregar
        </button>
      </div>
      {% endfor %}

    </div>
  </div>

  <!-- CARRITO -->
  <div class="cart-col text-white">
    <h5>🛒 Carrito</h5>

    <div id="carrito">
      <p class="text-muted">Vacío</p>
    </div>

    <hr>

    <h6>Total: $0.00</h6>

    <button class="btn btn-success w-100 mt-3">
      💳 Pagar
    </button>
  </div>

  <!-- ADMIN -->
  <div class="crud-col">
    <h5>⚙ Administración</h5>

    <a href="{% url 'register' %}" class="btn btn-primary w-100 mb-3">
      + Crear Usuario
    </a>

    <p class="text-muted">
      Aquí luego conectamos categorías y productos desde Django
    </p>
  </div>

</div>

</body>
</html>
