<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cajero Profesional - Juan del Sur</title>
 
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
 
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
 
body {

  background: #2B2D33;

  font-family: 'Segoe UI', system-ui, sans-serif;

  color: #FFFFFF;

}
 
/* ===== SIDEBAR ===== */

.sidebar {

    width: 250px;

    height: 100vh;

    background: #2f2f2f;

    color: white;

    position: fixed;

    top: 0;

    left: 0;

    padding: 20px;

}
 
.sidebar a {

    display: block;

    color: white;

    text-decoration: none;

    margin: 12px 0;

    padding: 8px 12px;

    border-radius: 8px;

    transition: 0.3s;

}
 
.sidebar a:hover {

    background-color: #0d6efd;

}
 
.sidebar hr {

    border-color: #555;

}
 
/* ===== WRAPPER ===== */

.content-wrapper {

    margin-left: 250px;

}
 
/* ===== HEADER ===== */

.top-header {

  background: #1F1F1F;

  padding: 12px 28px;

  display: flex;

  justify-content: space-between;

  align-items: center;

}
 
/* ===== DASHBOARD ===== */

.dashboard-three {

  display: flex;

  flex-wrap: wrap;

  gap: 24px;

  padding: 28px;

}
 
/* COLUMNAS */

.productos-col, .cart-col, .crud-col {

  border-radius: 32px;

  padding: 22px;

}
 
.productos-col {

  flex: 2;

  background: #F5F5F5;

  color: black;

}
 
.cart-col {

  flex: 1.2;

  background: #3A3A3A;

}
 
.crud-col {

  flex: 1.2;

  background: #EAEAEA;

  color: black;

  border-left: 5px solid #0671B8;

}
 
/* PRODUCTOS */

.product-grid {

  display: grid;

  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

  gap: 18px;

}
 
.card-producto {

  background: #E0E0E0;

  padding: 12px;

  border-radius: 20px;

}
 
.prod-nombre { font-weight: bold; }

.prod-precio { color: #0671B8; font-size: 1.2rem; }
 
</style>
</head>
 
<body>
 
<!-- SIDEBAR -->
<div class="sidebar">
<h5>Dashboard</h5>
<a href="#">Inicio</a>
<a href="#">Gestión de Usuarios</a>
<a href="{% url 'productos:inventario' %}">Productos</a>
<a href="#">Reportes</a>
<hr>
<a href="login.html">Cerrar sesión</a>
</div>
 
<!-- CONTENIDO -->
<div class="content-wrapper">
 
  <!-- HEADER -->
<div class="top-header">
<h4 class="m-0">🧾 Cajero</h4>
 
    <div>
<button class="btn btn-primary">Tienda</button>
<button class="btn btn-outline-light">Movimientos</button>
</div>
</div>
 
  <!-- DASHBOARD -->
<div class="dashboard-three">
 
    <!-- PRODUCTOS -->
<div class="productos-col">
<h5><i class="fas fa-store"></i> Catálogo de productos</h5>
 
      <input class="form-control mb-3" placeholder="Buscar productos...">
 
      <div class="product-grid">

        {% for p in productos %}
<div class="card-producto">
<div class="prod-nombre">{{ p.nombre }}</div>
<div>📦 {{ p.stock }}</div>
<div class="prod-precio">${{ p.precio }}</div>
 
          <button class="btn btn-sm btn-primary mt-2">

            🛒 Agregar
</button>
</div>

        {% endfor %}
</div>
</div>
 
    <!-- CARRITO -->
<div class="cart-col">
<h5>🛒 Carrito</h5>
 
      <div id="carrito">
<p class="text-muted">Vacío</p>
</div>
 
      <hr>
 
      <h6>Total: $0.00</h6>
 
      <button class="btn btn-success w-100 mt-3">

        💳 Pagar
</button>
</div>
 
    <!-- ADMIN -->
<div class="crud-col">
<h5>⚙ Administración</h5>
 
      <a href="{% url 'register' %}" class="btn btn-primary w-100 mb-3">

        + Crear Usuario
</a>
 
      <p class="text-muted">

        Gestión rápida del sistema
</p>
</div>
 
  </div>
 
</div>
 
</body>
</html>
